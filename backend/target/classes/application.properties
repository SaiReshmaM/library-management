# ============================================================
#  Library Management System - Application Configuration
# ============================================================

spring.application.name=library-management

# -----------------------------------------------
# Active Profile  (switch to 'mysql' for MySQL)
# -----------------------------------------------
spring.profiles.active=h2

# -----------------------------------------------
# H2 In-Memory Database (default / demo mode)
# -----------------------------------------------
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------
# JPA / Hibernate
# -----------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# -----------------------------------------------
# JWT Configuration
# -----------------------------------------------
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.expiration-ms=86400000

# -----------------------------------------------
# Swagger / OpenAPI
# -----------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# -----------------------------------------------
# Server
# -----------------------------------------------
server.port=8080
